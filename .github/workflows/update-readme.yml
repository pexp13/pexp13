name: Update README
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update README with PR activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import urllib.request, json, re, os
          token = os.environ['GITHUB_TOKEN']
          req = urllib.request.Request(
           'https://api.github.com/users/pexp13/events?per_page=100',
           headers={
            'Authorization': 'token ' + token,
            'Accept': 'application/vnd.github.v3+json',
            'User-Agent': 'readme-bot'
           }
          )
          with urllib.request.urlopen(req) as r:
           events = json.loads(r.read())
          pr_events = [e for e in events if e['type'] == 'PullRequestEvent']
          lines = []
          for e in pr_events:
           p = e['payload']
           pr = p.get('pull_request') or {}
           url = pr.get('html_url')
           if not url:
            continue
           action = p.get('action', '')
           repo = e['repo']['name']
           num = pr.get('number', '')
           if action == 'opened':
            emoji, verb = '\U0001F4AA', 'Opened PR'
           elif action == 'closed' and pr.get('merged'):
            emoji, verb = '\U0001F389', 'Merged PR'
           elif action == 'closed':
            emoji, verb = '\u274C', 'Closed PR'
           else:
            continue
           lines.append(str(len(lines)+1) + '. ' + emoji + ' ' + verb + ' [#' + str(num) + '](' + url + ') in [' + repo + '](https://github.com/' + repo + ')')
           if len(lines) >= 5:
            break
          activity = '\n'.join(lines) if lines else 'No recent PR activity.'
          with open('README.md') as f:
           content = f.read()
          new = re.sub(
           r'<!--START_SECTION:activity-->.*?<!--END_SECTION:activity-->',
           '<!--START_SECTION:activity-->\n' + activity + '\n<!--END_SECTION:activity-->',
           content, flags=re.DOTALL
          )
          with open('README.md', 'w') as f:
           f.write(new)
          print('Done: ' + str(len(lines)) + ' PRs')
          "
      - name: Commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update README with PR activity"
          git push
